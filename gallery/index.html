  // the links for sections within a page
  var headers = $(".section-link")
  for (let i = 0; i < headers.length; i++) {
    var header = $(headers[i])
    var text = header.text()
    // eg "Great Post Header/Thing" > "great-post-headerthing"
    var headerId = text.toLowerCase().split(/\s+/).join("-").replace(/(!|\)|\.)/g, "").replace(/(\/|\\|\||\()/g, "-")
    header.attr("id", headerId)
    header.html("<a href=\"#" + headerId + "\">" +
      text +
      "&nbsp;" +
      "<i class=\"fa fa-link fa-rotate-180 show-on-hover\" />" +
    "</a>")
  }

})</script>
